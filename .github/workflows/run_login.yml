name: RK Vision Auto Login

on:
  schedule:
    - cron: '30 3 * * *'   # Every day at 9:00 AM IST (3:30 AM UTC)
  workflow_dispatch:         # Manual run button

jobs:
  login:
    runs-on: ubuntu-22.04   # Fixed Ubuntu version — more stable

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Chromium and Tesseract
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            chromium-browser \
            chromium-chromedriver \
            tesseract-ocr \
            libnss3 \
            libgconf-2-4 \
            libxss1

      - name: Verify Chrome installation
        run: |
          chromium-browser --version
          which chromium-browser
          which chromedriver

      - name: Install Python packages
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Login Script
        env:
          CGM_USERNAME: ${{ secrets.CGM_USERNAME }}
          CGM_PASSWORD: ${{ secrets.CGM_PASSWORD }}
          CGM_MOBILE:   ${{ secrets.CGM_MOBILE }}
          WDM_LOG: "0"
        run: python only_login.py
